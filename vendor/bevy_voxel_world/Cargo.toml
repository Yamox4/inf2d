[package]
edition = "2021"
name = "bevy_voxel_world"
version = "0.16.0"
authors = ["Joacim Magnusson <joacim@isogram.se>"]
build = false
exclude = [
    "/.github/",
    "/assets/",
    "/examples/",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A voxel world plugin for Bevy"
homepage = "https://github.com/splashdust/bevy_voxel_world"
documentation = "https://github.com/splashdust/bevy_voxel_world"
readme = "README.md"
keywords = [
    "bevy",
    "gamedev",
    "voxelengine",
    "voxels",
]
categories = [
    "game-development",
    "graphics",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/splashdust/bevy_voxel_world"

[lib]
name = "bevy_voxel_world"
path = "src/lib.rs"

[dependencies.ahash]
version = "0.8.11"

[dependencies.bevy]
version = "0.18"
